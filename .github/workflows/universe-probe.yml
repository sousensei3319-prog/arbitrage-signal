name: Universe Probe (Phase1 temp)

# universe_probe.py の実データ疎通確認専用・一時workflow。
# サンドボックス(Claude Code)からはJPX/Nikkei公式サイトにproxy403で到達不可なため、
# TOPIX500/日経225構成銘柄の実URL形式・実ファイル形式の確認はこのランナー上でのみ可能。
# 検証が終わり次第、本体スクリプトと共にこのworkflowも削除する。

on:
  workflow_dispatch:
  push:
    paths:
      - 'universe_probe.py'
      - 'universe_refresh.py'
      - '.github/workflows/universe-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install optional excel readers (probe用のみ)
        run: pip install openpyxl xlrd

      - name: Run probe
        run: python universe_probe.py

      # universe_refresh.py の本番実装をdry-run検証 (実universe.csvは書き換えず一時ファイルへ)
      - name: Dry-run universe_refresh.py
        env:
          UNIVERSE_FILE: /tmp/universe_dryrun.csv
        run: |
          cp data/jp_stocks/universe.csv /tmp/universe_dryrun.csv
          python universe_refresh.py
          echo "--- 行数/バケット内訳 ---"
          wc -l /tmp/universe_dryrun.csv
          cut -d, -f3 /tmp/universe_dryrun.csv | sort | uniq -c
          echo "--- 先頭20行 ---"
          head -20 /tmp/universe_dryrun.csv
          echo "--- hotブロック(温存確認) ---"
          grep ',hot,' /tmp/universe_dryrun.csv
