name: Deploy Dashboard (GitHub Pages)

# 資金集中ダッシュボードを自動生成して GitHub Pages に配信する。
#
# 【重要】収集完了ごと(workflow_run)に発火させると、5分間隔の収集で公開が毎回発火し、
# GitHub Pages が前の公開を完了前に取り消し合って公開が永久に完了しない事象が発生した
# (2026-07-14・全runが cancelled。しかも新しい待機runが古い待機runをキュー段階で取り消す
# ため gate では防げなかった)。対策として workflow_run トリガーを廃止し、
# schedule(場中10分ごと)+ 手動 で公開する。これにより公開間隔が最低10分空き、
# Pages が取り消し合わなくなる。データ収集(jp-stock.yml)は従来どおり5分ごとで無関係。
# より確実・高頻度に公開したい場合は cron-job.org から pages.yml を10分ごとに叩く
# (収集と同じ要領。運用手順は SKILL.md)。

on:
  workflow_dispatch:
  schedule:
    # 東証立会時間(00:00-06:00 UTC=9:00-15:00 JST)の平日、10分ごとに再公開。
    # GitHub schedule は取りこぼしがあるため実効は15〜20分程度。確実性が要るなら外部cron併用。
    - cron: '3,13,23,33,43,53 0-6 * * 1-5'
    - cron: '37 6 * * 1-5'   # 引け後のバックアップ

permissions:
  contents: read
  pages: write
  id-token: write

# デプロイは直列化 (同時実行不可)。scheduleは最短10分間隔なのでデプロイ(数分)は重ならない。
# 【重要】2026-07-14の取り消し嵐で concurrency group "pages" のスロットが
# ゾンビ化し、以後の run が実体のいない占有者を待って永久に pending(job数0)に
# なる事象が発生した(2026-07-16確認: dispatchしたrunが3分経ってもjob 0)。
# グループ名を "pages-publish" に変更して未ロックの新グループへ移し、ロックを解除する。
# 嵐の原因(workflow_runトリガー)はPR #23で既に除去済みなので再ロックは起きない。
concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 最新の売買代金スクリーナー + 自動分析コメントを再計算 (money_flow.json)
      - name: Run money-flow screener
        env:
          WINDOW_MIN: '30'
        run: python jp_money_flow.py || echo "screener skipped (no data yet)"

      # 収集済みCSV + コメントから site/index.html を生成
      - name: Build dashboard HTML
        run: python dashboard/build_dashboard.py

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
