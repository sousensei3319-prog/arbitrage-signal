name: US Probe Wikipedia Tables (temporary)

# 【一時ファイル】Nasdaq-100 の構成銘柄テーブルが、全深さ収集のスタック式パーサでも
# 見つからない (2026-07-16 実測2回目) ため、v2として以下を一括調査する:
#   1. Wikipedia Nasdaq-100 ページの Components セクション周辺の生HTML (実構造の特定)
#   2. 代替ソースA: Invesco QQQ 公式保有銘柄CSV (ETF発行体の一次情報)
#   3. 代替ソースB: slickcharts.com/nasdaq100 (シンプルなHTMLテーブル)
# 原因特定して us_universe_refresh.py を修正したらこのファイルは削除する。

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/us-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Probe Nasdaq-100 sources
        run: |
          python3 - <<'EOF'
          import re
          import us_universe_refresh as u

          # 1) Components セクション周辺の生HTML
          try:
              html = u._fetch(u.NASDAQ100_URL, timeout=25).decode("utf-8", errors="replace")
              print(f"=== NQ100ページ: {len(html)}文字 ===")
              for anchor in ('id="Components"', 'id="constituents"', 'Components'):
                  i = html.find(anchor)
                  print(f"--- anchor {anchor!r}: index={i} ---")
                  if i >= 0:
                      print(html[i:i+1800].replace("\n", " ")[:1800])
                      break
          except Exception as e:
              print(f"NQ100ページ取得失敗: {type(e).__name__}: {e}")

          # 2) Invesco QQQ 公式保有CSV
          qqq = ("https://www.invesco.com/us/financial-products/etfs/holdings/main/holdings/0"
                 "?audienceType=Investor&action=download&ticker=QQQ")
          try:
              raw = u._fetch(qqq, timeout=25)
              text = raw.decode("utf-8-sig", errors="replace")
              lines = text.splitlines()
              print(f"=== QQQ CSV: {len(raw)}bytes / {len(lines)}行 ===")
              for ln in lines[:5]:
                  print("  " + ln[:200])
          except Exception as e:
              print(f"QQQ CSV取得失敗: {type(e).__name__}: {e}")

          # 3) slickcharts
          try:
              raw = u._fetch("https://www.slickcharts.com/nasdaq100", timeout=25)
              text = raw.decode("utf-8", errors="replace")
              print(f"=== slickcharts: {len(text)}文字 / NVDA含む={'NVDA' in text} ===")
              p = u._TableParser(); p.feed(text)
              for i, t in enumerate(p.tables[:6]):
                  if t and t[0]:
                      print(f"[{i}] rows={len(t)} header={t[0][:6]}")
          except Exception as e:
              print(f"slickcharts取得失敗: {type(e).__name__}: {e}")
          EOF
