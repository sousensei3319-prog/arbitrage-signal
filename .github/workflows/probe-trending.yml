name: Probe Trending Sources (temporary)

# 話題株ランキング取得源の偵察 (probe_trending.py)。
# サンドボックスからは日本の金融サイトへ到達不可のため、ランナー上で実データ検証する。
# 検証後にこのworkflowとprobe_trending.pyは削除する。フィーチャーブランチのみのため
# push トリガーで発火させる (workflow_dispatchは既定ブランチにマージ後のみ有効なGitHub仕様)。

on:
  push:
    paths:
      - 'probe_trending.py'
      - '.github/workflows/probe-trending.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Probe trending ranking sources
        run: python probe_trending.py
      # サンドボックスからはActionsログもログDL URLもproxy403で読めないため、
      # 偵察結果をファイルにコミットバックして git 経由で読めるようにする (一時)
      - name: Commit probe result
        run: |
          git config user.name "jp-stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- probe_result.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: probe結果 (一時)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || { git rebase --abort 2>/dev/null || true; }
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "push failed"
          fi
