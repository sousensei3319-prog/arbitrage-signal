name: Smart Money Daily Report

# ④スマートマネー追跡 デイリーダイジェスト (直近24h vs 前日24hの比較)
# scheduleはmainマージ後に有効。

on:
  schedule:
    # 毎日 21:07 JST (12:07 UTC)
    - cron: '7 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smart-money-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install matplotlib
        run: pip install --quiet matplotlib matplotlib-fontja

      - name: Run daily report
        env:
          SMART_MONEY_WEBHOOK_URL: ${{ secrets.SMART_MONEY_WEBHOOK_URL }}
          MENTION_EVERYONE: '1'
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPORT_WINDOW_DAYS: '1'
          MIN_RISE_USD: '250000'
          REPORT_N: '200'
          OUT_CSV: 'data/smart_money/attention_daily.csv'
        run: python smart_money_report.py

      - name: Persist daily screen
        run: |
          git config user.name "smart-money-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- data/smart_money/attention_daily.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "data: attention daily $(date -u +'%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "push failed"
          fi
